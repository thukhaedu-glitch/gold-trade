<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Trade Pro - Elite v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .tab-content { display: none; content-visibility: auto; }
        .tab-content.active { display: block; }
        .nav-active { color: #fbbf24; transform: translateY(-3px); transition: all 0.3s ease; }
        input, select { background: #111827 !important; border: 1px solid #374151 !important; color: white !important; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .price-card:hover .action-btns { opacity: 1; }
    </style>
</head>
<body class="bg-[#0b0f1a] text-white font-sans overflow-x-hidden">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center p-6">
        <div class="w-full max-w-sm p-8 rounded-3xl bg-gray-900 border border-gray-800 shadow-2xl">
            <h1 class="text-3xl font-black text-yellow-500 text-center mb-8 italic tracking-tighter">GOLD.TRADER</h1>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 rounded-xl outline-none focus:border-yellow-500">
                <input type="password" id="auth-pass" placeholder="Password" class="w-full p-4 rounded-xl outline-none focus:border-yellow-500">
                <button onclick="handleAuth('login')" class="w-full bg-yellow-500 text-black font-bold py-4 rounded-xl active:scale-95 transition">LOGIN</button>
                <button onclick="handleAuth('signup')" class="w-full text-gray-500 text-sm py-2 block mx-auto">Create account</button>
            </div>
            <p id="auth-error" class="text-red-500 text-[10px] mt-4 text-center font-bold uppercase"></p>
        </div>
    </div>

    <div id="app-screen" class="fade-in" style="display: none;">
        <header class="p-4 sticky top-0 bg-[#0b0f1a]/90 backdrop-blur-md z-40 border-b border-gray-800">
            <div class="max-w-md mx-auto flex justify-between items-center">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Live Price (AED)</span>
                    <span class="text-yellow-500 font-black text-2xl font-mono" id="current-price-header">0.00</span>
                </div>
                <button onclick="handleAuth('logout')" class="text-[10px] bg-red-900/20 text-red-500 border border-red-900/50 px-4 py-2 rounded-full font-bold">LOGOUT</button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 pb-32">
            
            <section id="buy" class="tab-content active space-y-4">
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-xl">
                    <div class="flex gap-2 mb-6 p-1 bg-black rounded-2xl">
                        <button id="mode-buy" onclick="setTradeMode('buy')" class="flex-1 py-3 rounded-xl font-black text-sm bg-green-600 text-white">BUY</button>
                        <button id="mode-sell" onclick="setTradeMode('sell')" class="flex-1 py-3 rounded-xl font-black text-sm text-gray-500">SELL</button>
                    </div>
                    <input type="number" id="trade-xau" placeholder="Amount (XAU)" oninput="convertGold()" class="w-full p-4 rounded-xl mb-2 text-xl font-mono outline-none">
                    <div class="text-right text-[11px] text-gray-500 mb-6 font-bold uppercase">≈ <span id="buy-gram" class="text-yellow-500">0.0000</span> Grams</div>
                    <label class="text-[10px] text-gray-500 font-black uppercase ml-1">Manual Date (Optional)</label>
                    <input type="datetime-local" id="trade-date" class="w-full p-4 rounded-xl mb-6 text-sm">
                    <button id="trade-btn" onclick="recordTrade(this)" class="w-full bg-green-600 text-white font-black py-4 rounded-2xl">CONFIRM PURCHASE</button>
                </div>
            </section>

            <section id="sold" class="tab-content space-y-4">
                <h2 class="font-black text-lg uppercase px-1">Trade History</h2>
                <div id="sold-list" class="space-y-3"></div>
            </section>

            <section id="wallet" class="tab-content space-y-6">
                <div class="bg-gradient-to-br from-yellow-500 to-yellow-700 p-8 rounded-[2rem] shadow-2xl text-black">
                    <p class="text-[10px] uppercase font-black opacity-60">Balance</p>
                    <h2 id="wallet-total-xau" class="text-4xl font-black mt-1">0.0000 XAU</h2>
                    <p id="wallet-total-gram" class="font-bold opacity-70 font-mono">0.00 g</p>
                </div>

                <div id="profit-calc" class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-xl"></div>

                <div class="bg-gray-900 p-4 rounded-3xl border border-gray-800">
                    <div class="flex gap-1 overflow-x-auto pb-4 no-scrollbar" id="filter-container">
                        <button onclick="updateFilter('1d', this)" class="filter-btn px-4 py-2 text-[10px] bg-yellow-500 text-black rounded-xl font-black">1D</button>
                        <button onclick="updateFilter('7d', this)" class="filter-btn px-4 py-2 text-[10px] bg-gray-800 text-gray-400 rounded-xl font-black">7D</button>
                        <button onclick="updateFilter('1m', this)" class="filter-btn px-4 py-2 text-[10px] bg-gray-800 text-gray-400 rounded-xl font-black">1M</button>
                        <button onclick="updateFilter('1y', this)" class="filter-btn px-4 py-2 text-[10px] bg-gray-800 text-gray-400 rounded-xl font-black">1Y</button>
                        <button onclick="toggleCustomDate()" class="filter-btn px-4 py-2 text-[10px] bg-gray-800 text-gray-400 rounded-xl font-black uppercase">Range</button>
                    </div>

                    <div id="custom-date-box" class="hidden grid grid-cols-2 gap-2 mb-4 p-3 bg-black/50 rounded-xl border border-gray-800">
                        <input type="date" id="start-date" class="p-2 text-[10px] rounded-lg">
                        <input type="date" id="end-date" class="p-2 text-[10px] rounded-lg">
                        <button onclick="applyCustomFilter()" class="col-span-2 bg-blue-600 py-2 rounded-lg text-[10px] font-black uppercase">Apply Custom Filter</button>
                    </div>

                    <div class="h-64"><canvas id="marketChart"></canvas></div>
                </div>
            </section>

            <section id="price" class="tab-content space-y-4">
                <div class="bg-gray-900 p-6 rounded-3xl border border-gray-800 shadow-xl">
                    <h2 id="price-form-title" class="font-bold mb-4 uppercase text-xs text-gray-500">Update Gold Price</h2>
                    <input type="hidden" id="edit-price-id">
                    <div class="space-y-4">
                        <input type="number" id="new-price" placeholder="1 XAU = ? AED" class="w-full p-4 rounded-xl font-mono outline-none">
                        <input type="datetime-local" id="price-date" class="w-full p-4 rounded-xl text-sm">
                        <div class="flex gap-2">
                            <button id="price-save-btn" onclick="savePrice(this)" class="flex-1 bg-blue-600 text-white font-black py-4 rounded-xl">SAVE PRICE</button>
                            <button id="cancel-edit-btn" onclick="resetPriceForm()" class="hidden bg-gray-800 text-gray-400 px-4 rounded-xl font-bold">CANCEL</button>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-3">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest px-1">Price History Logs</h3>
                    <div id="price-history-list" class="space-y-2">
                        </div>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-xl border-t border-gray-800 p-4 flex justify-around items-center z-50">
            <button onclick="showTab('buy')" class="nav-btn nav-active" id="btn-buy"><i class="fas fa-plus-square text-2xl"></i></button>
            <button onclick="showTab('sold')" class="nav-btn" id="btn-sold"><i class="fas fa-history text-2xl"></i></button>
            <button onclick="showTab('wallet')" class="nav-btn" id="btn-wallet"><i class="fas fa-wallet text-2xl"></i></button>
            <button onclick="showTab('price')" class="nav-btn" id="btn-price"><i class="fas fa-tag text-2xl"></i></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, deleteDoc, updateDoc, query, orderBy, onSnapshot, limit, serverTimestamp, Timestamp, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0NhhEe1Sgww1NNfD-Z2lPPERPddchBok",
            authDomain: "goldtrade-6e460.firebaseapp.com",
            projectId: "goldtrade-6e460",
            storageBucket: "goldtrade-6e460.firebasestorage.app",
            messagingSenderId: "101350979754",
            appId: "1:101350979754:web:78d3521192a39f28e738d3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const XAU_TO_GRAM = 31.1035;
        let currentPrice = 0, chart, tradeMode = 'buy', priceUnsub = null;

        // --- AUTH LOGIC ---
        window.handleAuth = async (type) => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (type === 'login') await signInWithEmailAndPassword(auth, email, pass);
                else if (type === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
                else await signOut(auth);
            } catch (err) { document.getElementById('auth-error').innerText = err.message; }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                initData();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        // --- NAVIGATION & UI MODES ---
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('nav-active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-'+id).classList.add('nav-active');
        };

        window.setTradeMode = (mode) => {
            tradeMode = mode;
            const isBuy = mode === 'buy';
            document.getElementById('mode-buy').className = `flex-1 py-3 rounded-xl font-black text-sm ${isBuy ? 'bg-green-600 text-white' : 'text-gray-500'}`;
            document.getElementById('mode-sell').className = `flex-1 py-3 rounded-xl font-black text-sm ${!isBuy ? 'bg-red-600 text-white' : 'text-gray-500'}`;
            document.getElementById('trade-btn').innerText = isBuy ? "CONFIRM PURCHASE" : "CONFIRM SALE";
            document.getElementById('trade-btn').className = `w-full ${isBuy ? 'bg-green-600' : 'bg-red-600'} text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition`;
        };

        // --- CHART FILTERS ---
        window.updateFilter = (period, btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => { b.className = "filter-btn px-4 py-2 text-[10px] bg-gray-800 text-gray-400 rounded-xl font-black"; });
            btn.className = "filter-btn px-4 py-2 text-[10px] bg-yellow-500 text-black rounded-xl font-black";
            document.getElementById('custom-date-box').classList.add('hidden');

            const now = new Date();
            let start;
            if (period === '1d') start = new Date(now.getTime() - 24*60*60*1000);
            else if (period === '7d') start = new Date(now.getTime() - 7*24*60*60*1000);
            else if (period === '1m') start = new Date(now.setMonth(now.getMonth()-1));
            else if (period === '1y') start = new Date(now.setFullYear(now.getFullYear()-1));
            syncPriceData(start, new Date());
        };

        window.toggleCustomDate = () => document.getElementById('custom-date-box').classList.toggle('hidden');
        window.applyCustomFilter = () => {
            const s = new Date(document.getElementById('start-date').value);
            const e = new Date(document.getElementById('end-date').value);
            if(s && e) syncPriceData(s, e);
        };

        // --- CORE DATA FUNCTIONS ---
        function initData() {
            updateFilter('1d', document.querySelector('.filter-btn'));
            
            // Sync Trade History
            onSnapshot(query(collection(db, "trades"), orderBy("timestamp", "desc")), (snap) => {
                const list = document.getElementById('sold-list');
                list.innerHTML = ''; let tX = 0, tC = 0;
                snap.docs.forEach(d => {
                    const data = d.data(); const isBuy = data.xau > 0;
                    tX += data.xau; if(isBuy) tC += data.totalAED;
                    list.innerHTML += `<div class="bg-gray-900 p-4 rounded-2xl border-l-4 ${isBuy?'border-green-500':'border-red-500'}">
                        <div class="flex justify-between items-start">
                            <div><p class="text-lg font-black ${isBuy?'text-green-500':'text-red-500'} font-mono">${Math.abs(data.xau)} XAU</p>
                            <p class="text-[9px] text-gray-500 uppercase font-bold">${data.timestamp?.toDate().toLocaleString()}</p></div>
                            <button onclick="deleteTrade('${d.id}')" class="text-gray-700 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
                        </div>
                        <div class="flex justify-between text-[10px] border-t border-gray-800 mt-2 pt-2 uppercase font-bold">
                            <span>Rate: <span class="text-yellow-500">${data.priceAtTrade?.toLocaleString()}</span></span>
                            <span>Total: <span class="text-white">${Math.abs(data.totalAED).toLocaleString()} AED</span></span>
                        </div>
                    </div>`;
                });
                updateWallet(tX, tC);
            });
        }

        function syncPriceData(start, end) {
            if (priceUnsub) priceUnsub();
            // We use desc for the list view, but will sort for the chart
            const q = query(collection(db, "prices"), where("timestamp", ">=", Timestamp.fromDate(start)), where("timestamp", "<=", Timestamp.fromDate(end)), orderBy("timestamp", "desc"));
            
            priceUnsub = onSnapshot(q, (snap) => {
                let gData = [], gLabels = [];
                const historyList = document.getElementById('price-history-list');
                historyList.innerHTML = '';

                // Get sorted data for Chart
                const chartDocs = [...snap.docs].sort((a,b) => a.data().timestamp - b.data().timestamp);
                chartDocs.forEach(d => {
                    const data = d.data();
                    gData.push(data.price);
                    gLabels.push(data.timestamp?.toDate().toLocaleDateString([], {month:'short', day:'numeric', hour:'2-digit'}));
                });

                // Populate Price List (Line by Line)
                snap.docs.forEach(d => {
                    const data = d.data();
                    const dateStr = data.timestamp?.toDate().toLocaleString() || 'N/A';
                    historyList.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between items-center group price-card">
                            <div>
                                <p class="text-yellow-500 font-black font-mono">${data.price.toLocaleString()} <span class="text-[9px] text-gray-600">AED</span></p>
                                <p class="text-[9px] text-gray-500 font-bold uppercase">${dateStr}</p>
                            </div>
                            <div class="flex gap-4 opacity-0 group-hover:opacity-100 action-btns transition">
                                <button onclick="editPrice('${d.id}', ${data.price}, '${data.timestamp?.toDate().toISOString().slice(0,16)}')" class="text-blue-500"><i class="fas fa-edit"></i></button>
                                <button onclick="deletePrice('${d.id}')" class="text-red-600"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>`;
                });

                if(chartDocs.length > 0) {
                    const latest = chartDocs[chartDocs.length-1].data().price;
                    currentPrice = latest;
                    document.getElementById('current-price-header').innerText = latest.toLocaleString();
                }
                updateChartUI(gLabels, gData);
            });
        }

        function updateWallet(tX, tC) {
            document.getElementById('wallet-total-xau').innerText = tX.toFixed(4) + " XAU";
            document.getElementById('wallet-total-gram').innerText = (tX * XAU_TO_GRAM).toFixed(2) + " g";
            const val = tX * currentPrice; const profit = val - tC;
            const pPct = tC > 0 ? (profit/tC)*100 : 0;
            document.getElementById('profit-calc').innerHTML = `<div class="flex justify-between items-center">
                <div><p class="text-2xl font-black font-mono">${val.toLocaleString(undefined,{minimumFractionDigits:2})} AED</p><p class="text-[9px] text-gray-500 uppercase font-bold">Net Cost: ${tC.toLocaleString()}</p></div>
                <div class="text-right ${profit>=0?'text-green-500':'text-red-500'}">
                    <p class="text-xl font-black">${profit>=0?'▲':'▼'} ${Math.abs(pPct).toFixed(2)}%</p>
                    <p class="text-[10px] font-bold">${Math.abs(profit).toLocaleString()} AED</p>
                </div></div>`;
        }

        function updateChartUI(labels, data) {
            const ctx = document.getElementById('marketChart');
            if (chart) { chart.data.labels = labels; chart.data.datasets[0].data = data; chart.update(); return; }
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels, datasets: [{ data, borderColor: '#fbbf24', borderWidth: 3, tension: 0.4, pointRadius: 4, pointBackgroundColor: '#fbbf24', fill: true, backgroundColor: 'rgba(251,191,36,0.1)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: '#4b5563', font: { size: 9 } } }, y: { grid: { color: '#1f2937' }, ticks: { color: '#4b5563', font: { size: 9 } } } } }
            });
        }

        // --- ACTIONS ---
        window.savePrice = async (btn) => {
            const p = parseFloat(document.getElementById('new-price').value);
            const d = document.getElementById('price-date').value;
            const editId = document.getElementById('edit-price-id').value;
            
            if(!p) return alert("Enter price"); btn.disabled = true;
            
            const payload = { 
                price: p, 
                timestamp: d ? Timestamp.fromDate(new Date(d)) : serverTimestamp() 
            };

            try {
                if(editId) {
                    await updateDoc(doc(db, "prices", editId), payload);
                } else {
                    await addDoc(collection(db, "prices"), payload);
                }
                resetPriceForm();
            } catch (err) { alert(err.message); }
            btn.disabled = false;
        };

        window.editPrice = (id, price, date) => {
            document.getElementById('edit-price-id').value = id;
            document.getElementById('new-price').value = price;
            document.getElementById('price-date').value = date;
            document.getElementById('price-form-title').innerText = "Edit Price Entry";
            document.getElementById('price-save-btn').innerText = "UPDATE PRICE";
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetPriceForm = () => {
            document.getElementById('edit-price-id').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('price-date').value = '';
            document.getElementById('price-form-title').innerText = "Update Gold Price";
            document.getElementById('price-save-btn').innerText = "SAVE PRICE";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        window.deletePrice = async (id) => {
            if(confirm("Permanently delete this price record?")) await deleteDoc(doc(db, "prices", id));
        };

        window.recordTrade = async (btn) => {
            const x = parseFloat(document.getElementById('trade-xau').value);
            const d = document.getElementById('trade-date').value;
            if(!x || !currentPrice) return alert("Check Details"); btn.disabled = true;
            const finalX = tradeMode === 'buy' ? x : -x;
            await addDoc(collection(db, "trades"), { xau: finalX, totalAED: finalX * currentPrice, priceAtTrade: currentPrice, timestamp: d ? Timestamp.fromDate(new Date(d)) : serverTimestamp() });
            document.getElementById('trade-xau').value = ''; btn.disabled = false;
        };

        window.convertGold = () => document.getElementById('buy-gram').innerText = (parseFloat(document.getElementById('trade-xau').value || 0) * XAU_TO_GRAM).toFixed(4);
        window.deleteTrade = async (id) => { if(confirm("Delete trade history?")) await deleteDoc(doc(db, "trades", id)); };
        
        // Expose to global for HTML onclicks
        window.editPrice = editPrice;
        window.deletePrice = deletePrice;
        window.savePrice = savePrice;
        window.resetPriceForm = resetPriceForm;
    </script>
</body>
</html>
